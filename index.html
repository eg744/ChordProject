<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Chord tool</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script async type="text/javascript" src="https://www.scales-chords.com/api/scales-chords-api.js"></script>
    <script src="script.js" defer></script>


</head>

<body>


    <h1 class="title">Main title</h1>

    <div class="main-content">

    </div>
    <div id="piano"></div>
    <label for="chord">Chord:</label>
    <select id="chord" onchange="showChord()">
        <option value="">Choose</option>option

        <option value="C">C</option>
        <option value="C#">C#</option>
        <option value="D">D</option>
        <option value="D#">D#</option>
        <option value="E">E</option>
        <option value="E#">E#</option>
        <option value="F">F</option>
        <option value="F#">F#</option>
        <option value="G">G</option>
        <option value="G#">G#</option>
        <option value="A">A</option>
        <option value="A#">A#</option>
        <option value="A">B</option>
        <option value="A#">B#</option>






        <option value="G">G</option>
    </select>

    <br><br>

    <div id="chord-container">
        <!-- <ins id="chordDisplay" class="scales_chords_api" chord="D" instrument="piano" output="image" nolink="true">
        </ins> -->

    </div>

</body>

</html>
